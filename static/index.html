<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#38035;&#40065;&#37038;&#20214;&#26816;&#27979;</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #3b82f6;
    --danger: #ef4444;
    --warning: #f59e0b;
    --safe: #22c55e;
    --rule: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .header svg { width: 28px; height: 28px; fill: var(--accent); }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header span { color: var(--text-dim); font-size: 13px; margin-left: auto; }

  .container {
    max-width: 760px;
    margin: 28px auto;
    padding: 0 16px 48px;
    flex: 1;
  }

  .mode-tabs, .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 14px;
    background: var(--card);
    border-radius: 10px;
    padding: 4px;
    flex-wrap: wrap;
  }
  .tab {
    flex: 1;
    min-width: 100px;
    padding: 10px 8px;
    text-align: center;
    cursor: pointer;
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-dim);
    transition: all .2s;
    border: none;
    background: none;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  .input-panel { display: none; }
  .input-panel.active { display: block; }

  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 10px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
  }
  .field input:focus { outline: none; border-color: var(--accent); }

  textarea {
    width: 100%;
    height: 200px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 14px;
    font-size: 14px;
    line-height: 1.6;
    resize: vertical;
    font-family: inherit;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea::placeholder { color: var(--text-dim); }

  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--card);
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent);
    background: rgba(59,130,246,0.05);
  }
  .dropzone svg { width: 44px; height: 44px; fill: var(--text-dim); margin-bottom: 10px; }
  .dropzone p { color: var(--text-dim); font-size: 14px; margin-top: 6px; }
  .dropzone .hint { font-size: 12px; opacity: 0.65; margin-top: 4px; }

  .preview-wrap { display: none; margin-top: 12px; position: relative; }
  .preview-wrap img {
    max-width: 100%;
    max-height: 280px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .preview-wrap .remove-btn {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.75); color: #fff; border: none;
    border-radius: 50%; width: 28px; height: 28px; cursor: pointer;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
  }

  .submit-btn {
    width: 100%; margin-top: 14px; padding: 14px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .2s;
  }
  .submit-btn:hover { opacity: 0.92; }
  .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .loading { display: none; text-align: center; padding: 28px; }
  .loading.active { display: block; }
  .spinner {
    width: 34px; height: 34px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--text-dim); font-size: 14px; }

  .result { display: none; margin-top: 22px; animation: fadeIn 0.3s; }
  .result.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

  .risk-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 18px; border-radius: 10px;
    font-size: 19px; font-weight: 700; margin-bottom: 12px;
  }
  .risk-badge.high { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
  .risk-badge.medium { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
  .risk-badge.safe { background: rgba(34,197,94,0.15); color: var(--safe); border: 1px solid rgba(34,197,94,0.3); }

  .meta-row { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; line-height: 1.5; }
  .meta-row strong { color: var(--text); }

  .banner-warn {
    display: none;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--warning);
    line-height: 1.5;
  }
  .banner-warn.active { display: block; }

  .missing-box {
    display: none;
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.25);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .missing-box.active { display: block; }
  .missing-box ul { margin: 8px 0 0 18px; }
  .missing-box li { margin: 4px 0; }

  .summary-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
    font-size: 14px;
    line-height: 1.65;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    margin: 16px 0 8px;
    color: var(--text-dim);
    text-transform: none;
  }

  .indicator {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    margin-bottom: 8px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .indicator .dot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 5px; flex-shrink: 0;
  }
  .indicator .dot.high { background: var(--danger); }
  .indicator .dot.medium { background: var(--warning); }
  .indicator .dot.low { background: var(--safe); }
  .indicator .src {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .indicator .src.rule { background: rgba(167,139,250,0.2); color: var(--rule); }
  .indicator .src.ai { background: rgba(59,130,246,0.15); color: var(--accent); }
  .indicator .ind-type { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .indicator .ind-detail { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

  .url-list { font-size: 12px; color: var(--text-dim); word-break: break-all; }
  .url-list div { margin: 4px 0; padding: 6px 8px; background: rgba(15,23,42,0.5); border-radius: 6px; }

  .recommendation {
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 10px;
    padding: 14px;
    margin-top: 14px;
    font-size: 14px;
    line-height: 1.65;
  }

  .actions {
    display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap;
  }
  .actions button {
    flex: 1;
    min-width: 120px;
    padding: 11px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
  }
  .actions button.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .actions button:hover { opacity: 0.9; }

  .feedback-row { margin-top: 12px; font-size: 13px; color: var(--text-dim); }
  .feedback-row button {
    margin-right: 8px;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
  }
  .feedback-row button:hover { border-color: var(--accent); }

  .error-msg {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 14px;
    margin-top: 14px;
    color: var(--danger);
    font-size: 14px;
  }
  .error-msg.active { display: block; }

  .footer-note {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="header">
  <svg viewBox="0 0 24 24"><path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5zm-1 14l-4-4 1.41-1.41L11 13.17l6.59-6.59L19 8l-8 8z"/></svg>
  <h1>&#38035;&#40065;&#37038;&#20214;&#26816;&#27979;</h1>
  <span>&#20225;&#19994;&#20869;&#37096; &middot; &#35268;&#21017; + AI</span>
</div>

<div class="container">
  <div class="mode-tabs">
    <button type="button" class="tab active" data-mode="quick">&#24555;&#36895;&#31896;&#36148;</button>
    <button type="button" class="tab" data-mode="structured">&#32467;&#26500;&#21270;&#36755;&#20837;</button>
    <button type="button" class="tab" data-mode="image">&#37038;&#20214;&#25130;&#22270;</button>
  </div>

  <div class="input-panel active" id="panel-quick">
    <textarea id="emailText" placeholder="&#23558;&#37038;&#20214;&#20840;&#25991;&#31896;&#36148;&#21040;&#27492;&#65288;&#21487;&#21547;&#21457;&#20214;&#20154;&#12289;&#20027;&#39064;&#12289;&#27491;&#25991;&#65289;"></textarea>
  </div>

  <div class="input-panel" id="panel-structured">
    <div class="field">
      <label for="fromAddr">&#21457;&#20214;&#20154;</label>
      <input type="text" id="fromAddr" placeholder="&#20363;&#65306; IT Support &lt;support@company.com&gt;">
    </div>
    <div class="field">
      <label for="subj">&#20027;&#39064;</label>
      <input type="text" id="subj" placeholder="&#37038;&#20214;&#20027;&#39064;">
    </div>
    <div class="field">
      <label for="bodyText">&#27491;&#25991;</label>
      <textarea id="bodyText" style="height:160px" placeholder="&#27491;&#25991;&#20869;&#23481;&#12289;&#38142;&#25509;&#31561;"></textarea>
    </div>
  </div>

  <div class="input-panel" id="panel-image">
    <div class="dropzone" id="dropzone">
      <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
      <p>&#25302;&#25341;&#22270;&#29255;&#65292;&#25110;&#28857;&#20987;&#36873;&#25321;</p>
      <p class="hint">Ctrl+V &#31896;&#36148;&#25130;&#22270;</p>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>
    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" alt="">
      <button type="button" class="remove-btn" id="removeBtn">&times;</button>
    </div>
  </div>

  <button type="button" class="submit-btn" id="submitBtn">&#24320;&#22987;&#26816;&#27979;</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>&#27491;&#22312;&#32467;&#21512;&#35268;&#21017;&#24341;&#25806;&#19982; AI &#20998;&#26512;&#8230;</p>
  </div>
  <div class="error-msg" id="errorMsg"></div>

  <div class="result" id="result">
    <div class="risk-badge" id="riskBadge"></div>
    <div class="meta-row" id="metaRow"></div>
    <div class="banner-warn" id="reconBanner"></div>
    <div class="missing-box" id="missingBox"><strong>&#20449;&#24687;&#8865;&#20805;&#24314;&#35758;</strong><ul id="missingList"></ul></div>
    <div class="summary-box" id="summary"></div>
    <div class="section-title">&#35268;&#21017;&#23618;&#25688;&#35201;&#65288;URL &#31561;&#65289;</div>
    <div class="url-list" id="urlSummary"></div>
    <div class="section-title">&#39118;&#38505;&#25351;&#26631;&#65288;&#35268;&#21017; + AI&#65289;</div>
    <div id="indicators"></div>
    <div class="recommendation" id="recommendation"></div>
    <div class="actions">
      <button type="button" class="primary" id="copyBtn">&#22797;&#21046;&#25253;&#21578;</button>
      <button type="button" id="resetBtn">&#37325;&#26032;&#26816;&#27979;</button>
    </div>
    <div class="feedback-row" id="feedbackRow">
      <span>&#32467;&#35770;&#20934;&#30830;&#21527;&#65311;</span>
      <button type="button" data-fb="ok">&#20934;&#30830;</button>
      <button type="button" data-fb="wrong">&#19981;&#20934;</button>
    </div>
  </div>

  <p class="footer-note" id="footerDisclaimer"></p>
</div>

<script>
const $ = s => document.querySelector(s);
let selectedFile = null;
let currentMode = 'quick';
let lastResponse = null;

document.querySelectorAll('.mode-tabs .tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tabs .tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    currentMode = tab.dataset.mode;
    $(`#panel-${currentMode}`).classList.add('active');
  });
});

const dropzone = $('#dropzone');
const fileInput = $('#fileInput');
dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) handleFile(fileInput.files[0]);
});

document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      document.querySelectorAll('.mode-tabs .tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.input-panel').forEach(p => p.classList.remove('active'));
      document.querySelector('[data-mode="image"]').classList.add('active');
      $('#panel-image').classList.add('active');
      currentMode = 'image';
      handleFile(item.getAsFile());
      return;
    }
  }
});

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = e => {
    $('#previewImg').src = e.target.result;
    $('#previewWrap').style.display = 'block';
    dropzone.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

$('#removeBtn').addEventListener('click', () => {
  selectedFile = null;
  fileInput.value = '';
  $('#previewWrap').style.display = 'none';
  dropzone.style.display = 'block';
});

function buildFormData() {
  const fd = new FormData();
  if (currentMode === 'quick') {
    const t = $('#emailText').value.trim();
    if (t) fd.append('text', t);
  } else if (currentMode === 'structured') {
    const f = $('#fromAddr').value.trim();
    const s = $('#subj').value.trim();
    const b = $('#bodyText').value.trim();
    if (f) fd.append('from_addr', f);
    if (s) fd.append('subject', s);
    if (b) fd.append('body', b);
  }
  if (selectedFile) fd.append('image', selectedFile);
  return fd;
}

function validateForm(fd) {
  if (currentMode === 'quick' && !$('#emailText').value.trim() && !selectedFile) {
    showError('&#35831;&#31896;&#36148;&#37038;&#20214;&#20869;&#23481;&#25110;&#19978;&#20256;&#25130;&#22270;');
    return false;
  }
  if (currentMode === 'structured') {
    const b = $('#bodyText').value.trim();
    if (!b && !selectedFile) {
      showError('&#35831;&#22635;&#20889;&#27491;&#25991;&#25110;&#19978;&#20256;&#25130;&#22270;');
      return false;
    }
  }
  if (currentMode === 'image' && !selectedFile) {
    showError('&#35831;&#19978;&#20256;&#25110;&#31896;&#36148;&#25130;&#22270;');
    return false;
  }
  return true;
}

$('#submitBtn').addEventListener('click', async () => {
  const fd = buildFormData();
  if (!validateForm(fd)) return;

  $('#submitBtn').disabled = true;
  $('#loading').classList.add('active');
  $('#result').classList.remove('active');
  $('#errorMsg').classList.remove('active');

  try {
    const resp = await fetch('/api/analyze', { method: 'POST', body: fd });
    const json = await resp.json();
    lastResponse = json;
    if (json.disclaimer) $('#footerDisclaimer').textContent = json.disclaimer;

    if (!resp.ok || json.error) {
      showError(json.error || '&#20998;&#26512;&#22833;&#36133;');
      return;
    }
    renderResult(json.data);
  } catch (err) {
    showError('&#32593;&#32476;&#38169;&#35823;&#65292;&#35831;&#30830;&#35748;&#26381;&#21153;&#24050;&#21551;&#21160;');
  } finally {
    $('#loading').classList.remove('active');
    $('#submitBtn').disabled = false;
  }
});

function showError(msg) {
  $('#errorMsg').innerHTML = msg;
  $('#errorMsg').classList.add('active');
}

function renderResult(data) {
  const badge = $('#riskBadge');
  const riskMap = {
    '\u9ad8\u5371': { cls: 'high', label: '\u9ad8\u5371 \u00b7 \u6309\u9493\u9c7c\u5904\u7f6e' },
    '\u53ef\u7591': { cls: 'medium', label: '\u53ef\u7591 \u00b7 \u4fdd\u6301\u8b66\u60d5' },
    '\u5b89\u5168': { cls: 'safe', label: '\u6682\u672a\u53d1\u73b0\u660e\u663e\u9493\u9c7c\u7279\u5f81' },
  };
  const r = riskMap[data.risk_level] || riskMap['\u53ef\u7591'];
  badge.className = 'risk-badge ' + r.cls;
  badge.textContent = r.label;

  let meta = `\u7f6e\u4fe1\u5ea6\uff1a<strong>${data.confidence ?? '--'}%</strong>`;
  if (data.llm_risk_level && data.llm_risk_level !== data.risk_level) {
    meta += ` &nbsp;\u00b7&nbsp; AI \u539f\u59cb\u8bc4\u7ea7\uff1a<strong>${data.llm_risk_level}</strong>`;
  }
  meta += ` &nbsp;\u00b7&nbsp; \u89c4\u5219\u5c42\u63d0\u793a\uff1a<strong>${data.rule_summary?.rule_risk_hint || '--'}</strong>`;
  meta += ` &nbsp;\u00b7&nbsp; URL \u6570\uff1a<strong>${data.rule_summary?.url_count ?? 0}</strong>`;
  $('#metaRow').innerHTML = meta;

  const rb = $('#reconBanner');
  if (data.reconciliation_note) {
    rb.textContent = data.reconciliation_note;
    rb.classList.add('active');
  } else {
    rb.classList.remove('active');
  }

  const mb = $('#missingBox');
  const ml = $('#missingList');
  ml.innerHTML = '';
  if (data.missing_info && data.missing_info.length) {
    mb.classList.add('active');
    data.missing_info.forEach(m => {
      const li = document.createElement('li');
      li.textContent = m;
      ml.appendChild(li);
    });
  } else {
    mb.classList.remove('active');
  }

  $('#summary').textContent = data.summary || '';

  const urlBox = $('#urlSummary');
  urlBox.innerHTML = '';
  const urls = data.rule_summary?.urls || [];
  if (!urls.length) {
    urlBox.textContent = '\u672a\u68c0\u6d4b\u5230\u94fe\u63a5\u6216\u65e0\u989d\u5916 URL \u5143\u6570\u636e\u3002';
  } else {
    urls.forEach(u => {
      const d = document.createElement('div');
      const hits = (u.hits && u.hits.length) ? ` [\u547d\u4e2d: ${u.hits.join(', ')}]` : '';
      d.textContent = u.url + hits;
      urlBox.appendChild(d);
    });
  }

  const indWrap = $('#indicators');
  indWrap.innerHTML = '';
  (data.indicators || []).forEach(ind => {
    const src = ind.source === 'rule' ? 'rule' : 'ai';
    const srcLabel = src === 'rule' ? 'RULE' : 'AI';
    indWrap.innerHTML += `
      <div class="indicator">
        <span class="dot ${ind.severity || 'medium'}"></span>
        <span class="src ${src}">${srcLabel}</span>
        <div>
          <div class="ind-type">${escapeHtml(ind.type || '')}</div>
          <div class="ind-detail">${escapeHtml(ind.detail || '')}</div>
        </div>
      </div>`;
  });

  $('#recommendation').textContent = data.recommendation || '';

  $('#result').classList.add('active');
  $('#errorMsg').classList.remove('active');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

$('#copyBtn').addEventListener('click', () => {
  if (!lastResponse || !lastResponse.data) return;
  const d = lastResponse.data;
  let t = `\u7efc\u5408\u8bc4\u7ea7: ${d.risk_level}\n`;
  if (d.llm_risk_level !== d.risk_level) t += `AI \u539f\u59cb: ${d.llm_risk_level}\n`;
  t += `\u7f6e\u4fe1\u5ea6: ${d.confidence}%\n\u6458\u8981: ${d.summary}\n\n`;
  if (d.reconciliation_note) t += `\u8c03\u6574\u8bf4\u660e: ${d.reconciliation_note}\n\n`;
  (d.indicators || []).forEach(i => {
    t += `[${i.source}] ${i.type} (${i.severity}): ${i.detail}\n`;
  });
  t += `\n\u5efa\u8bae: ${d.recommendation}\n`;
  navigator.clipboard.writeText(t).catch(() => {});
});

$('#resetBtn').addEventListener('click', () => {
  $('#result').classList.remove('active');
  $('#emailText').value = '';
  $('#fromAddr').value = '';
  $('#subj').value = '';
  $('#bodyText').value = '';
  selectedFile = null;
  fileInput.value = '';
  $('#previewWrap').style.display = 'none';
  dropzone.style.display = 'block';
  lastResponse = null;
});

document.querySelectorAll('#feedbackRow button').forEach(btn => {
  btn.addEventListener('click', async () => {
    if (!lastResponse || !lastResponse.data) return;
    const d = lastResponse.data;
    try {
      await fetch('/api/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          kind: btn.dataset.fb,
          shown_risk: d.risk_level,
          llm_risk: d.llm_risk_level,
        }),
      });
      btn.textContent = '\u5df2\u8bb0\u5f55';
      btn.disabled = true;
    } catch (_) {}
  });
});
</script>
</body>
